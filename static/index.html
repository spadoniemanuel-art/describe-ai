<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
  <title>DescribeAI — Descripciones de producto con IA</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      color: #222;
    }
    .card {
      background: #fff;
      width: 100%;
      max-width: 560px;
      border-radius: 16px;
      padding: 40px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    }
    h1 { font-size: 2rem; margin-bottom: 8px; color: #1a1a2e; }
    .subtitle { color: #666; margin-bottom: 28px; font-size: 0.95rem; }
    label {
      display: block;
      font-weight: 600;
      margin-bottom: 6px;
      font-size: 0.9rem;
      color: #333;
    }
    input, select {
      width: 100%;
      padding: 12px 14px;
      border: 2px solid #e1e4e8;
      border-radius: 8px;
      font-size: 1rem;
      margin-bottom: 18px;
      transition: border-color 0.2s;
      font-family: inherit;
    }
    input:focus, select:focus {
      outline: none;
      border-color: #667eea;
    }
    input[type="file"] { padding: 10px; background: #f8f9fa; cursor: pointer; }
    .row { display: flex; gap: 12px; }
    .row > div { flex: 1; }
    button {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.1s, box-shadow 0.2s;
    }
    button:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(102,126,234,0.4);
    }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .status {
      margin-top: 20px;
      padding: 14px;
      border-radius: 8px;
      font-size: 0.92rem;
      display: none;
    }
    .status.ok { background: #d4edda; color: #155724; display: block; }
    .status.err { background: #f8d7da; color: #721c24; display: block; }
    .badge {
      display: inline-block;
      background: #667eea;
      color: #fff;
      padding: 3px 10px;
      border-radius: 999px;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.5px;
      margin-bottom: 12px;
    }
  </style>
</head>
<body>
  <div class="card">
    <span class="badge">POWERED BY AI</span>
    <h1>DescribeAI</h1>
    <p class="subtitle">Subí tu CSV con productos y recibí las descripciones generadas por email.</p>

    <form id="form">
      <label for="file">Archivo CSV <small style="color:#888">(columnas: nombre, categoria, caracteristicas)</small></label>
      <input type="file" id="file" name="file" accept=".csv" required />

      <label for="email">Email de entrega</label>
      <input type="email" id="email" name="email" placeholder="tu@email.com" required />

      <label for="storeName">Nombre de tu tienda</label>
      <input type="text" id="storeName" name="storeName" placeholder="Mi Tienda" value="Mi Tienda" required />

      <div class="row">
        <div>
          <label for="tone">Tono</label>
          <select id="tone" name="tone">
            <option value="profesional">Profesional</option>
            <option value="amigable">Amigable</option>
            <option value="lujoso">Lujoso</option>
            <option value="divertido">Divertido</option>
            <option value="tecnico">Técnico</option>
          </select>
        </div>
        <div>
          <label for="lang">Idioma</label>
          <select id="lang" name="lang">
            <option value="es">Español</option>
            <option value="en">English</option>
            <option value="pt">Português</option>
            <option value="fr">Français</option>
          </select>
        </div>
      </div>

      <button type="submit" id="submitBtn">Generar descripciones</button>
    </form>

    <div class="status" id="status"></div>
  </div>

  <script>
    const form = document.getElementById('form');
    const btn = document.getElementById('submitBtn');
    const statusEl = document.getElementById('status');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      statusEl.className = 'status';
      statusEl.textContent = '';

      const data = new FormData();
      data.append('file', document.getElementById('file').files[0]);
      data.append('email', document.getElementById('email').value);
      data.append('storeName', document.getElementById('storeName').value);
      data.append('tone', document.getElementById('tone').value);
      data.append('lang', document.getElementById('lang').value);

      btn.disabled = true;
      btn.textContent = 'Enviando...';

      try {
        const res = await fetch('/procesar', { method: 'POST', body: data });
        if (!res.ok) throw new Error('Error ' + res.status);
        const json = await res.json();
        statusEl.className = 'status ok';
        statusEl.textContent = '✅ ' + (json.message || 'Listo. Te llega por email en minutos.');
        form.reset();
      } catch (err) {
        statusEl.className = 'status err';
        statusEl.textContent = '❌ ' + err.message;
      } finally {
        btn.disabled = false;
        btn.textContent = 'Generar descripciones';
      }
    });
  </script>
</body>
</html>
